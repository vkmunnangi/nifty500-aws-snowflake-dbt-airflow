version: 2

models:
  - name: weekly_prices
    description: "Weekly OHLCV bars resampled from daily data (Friday close)"
    columns:
      - name: date
        description: "Week ending Friday date"
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: close
        tests: [not_null]
    tests:
      - unique:
          column_name: "symbol || '-' || date"

  - name: monthly_prices
    description: "Monthly OHLCV bars resampled from daily data (month end)"
    columns:
      - name: date
        description: "Month end date"
        tests: [not_null]
      - name: symbol
        tests: [not_null]
      - name: close
        tests: [not_null]
    tests:
      - unique:
          column_name: "symbol || '-' || date"
